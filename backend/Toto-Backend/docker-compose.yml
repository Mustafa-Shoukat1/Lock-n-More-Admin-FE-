

services:
  backend:
    build: .
    container_name: toto_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Pass all other env vars here or use env_file
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host services if needed
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.2'
        reservations:
          memory: 512M
