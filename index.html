<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOTO | AI Messaging & Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #F8FAFC;
            --bg-surface: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --color-brand: #2563EB;
            --color-accent: #3B82F6;
            --color-success: #10B981;
            --color-warning: #F59E0B;
            --border-color: #E2E8F0;
        }

        .dark {
            --bg-primary: #020617;
            --bg-surface: #0F172A;
            --bg-sidebar: #020617;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --color-brand: #3B82F6;
            --color-accent: #60A5FA;
            --color-success: #34D399;
            --color-warning: #FBBF24;
            --border-color: #1E293B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            transition: background-color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }
        
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
        }

        .transition-all {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: radial-gradient(circle, var(--border-color) 1px, transparent 1px);
        }
    </style>
    <script>
        // Polyfill process for browser environment to prevent crashes on process.env access
        window.process = window.process || { env: {} };
        
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                brand: 'var(--color-brand)',
                accent: 'var(--color-accent)',
                surface: 'var(--bg-surface)',
                primary: 'var(--bg-primary)',
              }
            }
          }
        }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        } else {
          document.documentElement.classList.remove('dark')
        }
    </script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0",
    "react-router": "https://esm.sh/react-router@^7.11.0"
  }
}
</script>
</head>
<body class="bg-grid">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
